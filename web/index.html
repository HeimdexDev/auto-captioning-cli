<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>캡셔닝 결과 비교 — 사람 vs AI</title>
  <!-- React + Babel (CDN): no build step; JSX is transformed in the browser -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style> html, body { margin: 0; background: #fff; } </style>
</head>
<body>
  <div id="root"></div>

  <!-- Diagnostic overlay: surface any error on screen instead of a blank page -->
  <script>
    window.addEventListener("error", function (e) {
      var msg = (e.error && e.error.stack) ? e.error.stack : (e.message || String(e));
      document.getElementById("root").innerHTML =
        '<pre style="color:#c00;white-space:pre-wrap;padding:24px;font:13px/1.5 monospace">⚠️ 에러 발생:\n\n' +
        msg + '\n\n' + (e.filename || '') + (e.lineno ? (' : line ' + e.lineno) : '') + '</pre>';
    });
    window.addEventListener("load", function () {
      if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
        document.getElementById("root").innerHTML =
          '<pre style="color:#c00;padding:24px;font:13px/1.5 monospace">⚠️ React CDN을 불러오지 못했습니다 (unpkg.com 차단 가능성).</pre>';
      } else if (typeof Babel === "undefined") {
        document.getElementById("root").innerHTML =
          '<pre style="color:#c00;padding:24px;font:13px/1.5 monospace">⚠️ Babel CDN을 불러오지 못했습니다 (unpkg.com 차단 가능성).</pre>';
      }
    });
  </script>

  <script type="text/plain" id="app-source">
const { useEffect, useRef, useState } = React;

/* =====================================================================
 * Data contract (GET /api/comparison) — an array of scene entries:
 *   { scene_id, video_id, video_url, full_video_url, clip_start, clip_end,
 *     keyframes:[...], subtitle_url, human_caption,
 *     claude_references:[ {ref_id, caption, shot_type, motion_type,
 *       temporal_change, text_on_screen, mood, notes} ], quality_notes }
 * Every field is nullable; the UI degrades gracefully.
 * ===================================================================== */

/* ===================== Design tokens ===================== */
const T = {
  navy: "#234C77", aiBg: "#eef3f9", humanBg: "#f4f5f7",
  text: "#1f2733", sub: "#6b7686", line: "#e6e9ef", bg: "#ffffff",
  fontKo: "'Pretendard', system-ui, sans-serif",
  fontEn: "'Pretendard', system-ui, sans-serif",
};

/* ===================== Heimdex logo (inline SVG) ===================== */

/* ===================== Icons ===================== */
const Ico = {
  user: (p) => (<svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M9.99992 10.8333C12.3011 10.8333 14.1666 8.96785 14.1666 6.66667C14.1666 4.36548 12.3011 2.5 9.99992 2.5C7.69873 2.5 5.83325 4.36548 5.83325 6.66667C5.83325 8.96785 7.69873 10.8333 9.99992 10.8333ZM9.99992 10.8333C11.768 10.8333 13.4637 11.5357 14.714 12.786C15.9642 14.0362 16.6666 15.7319 16.6666 17.5M9.99992 10.8333C8.23181 10.8333 6.53612 11.5357 5.28587 12.786C4.03563 14.0362 3.33325 15.7319 3.33325 17.5" /></svg>),

  chevronLeft: (p) => (<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M15 6l-6 6 6 6" /></svg>),
  chevronRight: (p) => (<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M9 6l6 6-6 6" /></svg>),

};

const REF_LABELS = { ref_a: "행동", ref_b: "공간", ref_c: "요약" };
const REF_ORDER = ["ref_a", "ref_b", "ref_c"];

function useFonts() {
  useEffect(() => {
    const href = "https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css";
    if (document.querySelector(`link[href="${href}"]`)) return;
    const el = document.createElement("link"); el.rel = "stylesheet"; el.href = href; document.head.appendChild(el);
  }, []);
}

/* ===================== Caption cards ===================== */
function MetaChips({ ref_ }) {
  if (!ref_) return null;
  const chips = [];
  if (ref_.shot_type) chips.push(ref_.shot_type);
  if (ref_.motion_type) chips.push(ref_.motion_type);
  if (ref_.temporal_change) chips.push(`change: ${ref_.temporal_change}`);
  if (Array.isArray(ref_.text_on_screen) && ref_.text_on_screen.length) chips.push(`자막: ${ref_.text_on_screen.join(" / ")}`);
  if (Array.isArray(ref_.mood) && ref_.mood.length) chips.push(ref_.mood.join(", "));
  if (!chips.length) return null;
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 4 }}>
      {chips.map((c, i) => (
        <span key={i} style={{ fontFamily: T.fontEn, fontSize: 12, color: T.sub, background: "rgba(35,76,119,.07)", padding: "3px 8px", borderRadius: 6 }}>{c}</span>
      ))}
    </div>
  );
}

function HumanCard({ caption }) {
  return (
    <div style={{ flex: 1, minWidth: 0, background: T.humanBg, borderRadius: 14, padding: "22px 24px", display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 11 }}>
        <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 38, height: 38, borderRadius: 10, color: "#fff", background: "#9aa4b2", flexShrink: 0 }}><Ico.user width="24" height="24" /></span>
        <span style={{ fontFamily: T.fontKo, fontWeight: 600, fontSize: 18, color: T.sub, letterSpacing: ".01em" }}>사람</span>
      </div>
      <p style={{ margin: 0, fontFamily: T.fontKo, fontSize: 19, fontWeight: 500, lineHeight: 1.65, color: caption ? T.text : "#aab2bd", wordBreak: "keep-all" }}>
        {caption || "사람 캡션 없음"}
      </p>
    </div>
  );
}

function AICard({ references }) {
  const refs = Array.isArray(references) ? references : [];
  const byId = {};
  refs.forEach((r) => { if (r && r.ref_id) byId[r.ref_id] = r; });
  const available = REF_ORDER.filter((id) => byId[id]);
  const [active, setActive] = useState(available[0] || null);

  // reset active ref when the scene's reference set changes
  useEffect(() => { setActive(available[0] || null); }, [references]);

  const cur = active ? byId[active] : null;
  return (
    <div style={{ flex: 1, minWidth: 0, background: T.aiBg, borderRadius: 14, padding: "22px 24px", display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 11 }}>
        <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 38, height: 38, borderRadius: 10, color: "#fff", background: T.navy, flexShrink: 0 }}><Ico.sparkles width="24" height="24" /></span>
        <span style={{ fontFamily: T.fontKo, fontWeight: 600, fontSize: 18, color: T.navy, letterSpacing: ".01em" }}>AI</span>
        {available.length > 1 && (
          <div style={{ marginLeft: "auto", display: "flex", gap: 4, background: "#fff", borderRadius: 9, padding: 3, border: `1px solid ${T.line}` }}>
            {available.map((id) => {
              const on = id === active;
              return (
                <button key={id} onClick={() => setActive(id)} title={`${id} · ${REF_LABELS[id]} 흐름`}
                  style={{ border: "none", cursor: "pointer", fontFamily: T.fontKo, fontSize: 13, fontWeight: 600, padding: "5px 11px", borderRadius: 7, color: on ? "#fff" : T.sub, background: on ? T.navy : "transparent", transition: "background .12s ease" }}>
                  {REF_LABELS[id]}
                </button>
              );
            })}
          </div>
        )}
      </div>
      <p style={{ margin: 0, fontFamily: T.fontKo, fontSize: 19, fontWeight: 500, lineHeight: 1.65, color: cur ? T.text : "#aab2bd", wordBreak: "keep-all" }}>
        {cur ? cur.caption : "AI 캡션 없음"}
      </p>
      <MetaChips ref_={cur} />
    </div>
  );
}

/* ===================== Arrows ===================== */
function ArrowButton({ dir, onClick, disabled }) {
  return (
    <button aria-label={dir === "left" ? "이전" : "다음"} onClick={onClick} disabled={disabled}
      style={{ width: 48, height: 48, borderRadius: "50%", border: "none", flexShrink: 0, display: "inline-flex", alignItems: "center", justifyContent: "center", background: disabled ? "#f1f3f6" : "#fff", color: disabled ? "#c4cad3" : T.navy, boxShadow: disabled ? "none" : "0 2px 10px rgba(35,76,119,.14)", cursor: disabled ? "default" : "pointer", transition: "transform .12s ease" }}
      onMouseDown={(e) => !disabled && (e.currentTarget.style.transform = "scale(.92)")}
      onMouseUp={(e) => (e.currentTarget.style.transform = "scale(1)")}
      onMouseLeave={(e) => (e.currentTarget.style.transform = "scale(1)")}>
      {dir === "left" ? <Ico.chevronLeft /> : <Ico.chevronRight />}
    </button>
  );
}

/* ===================== Media (video clip → keyframe → placeholder) ===================== */
function Placeholder() {
  return (<div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", background: "#1d2733", color: "#5f6b7a" }}><Ico.photo /></div>);
}

function SceneMedia({ entry, showFull }) {
  const [videoFailed, setVideoFailed] = useState(false);
  const [imgFailed, setImgFailed] = useState(false);

  const firstKf = (entry.keyframes && entry.keyframes[0]) || "";
  const clipUrl = entry.video_url || null;
  const fullUrl = entry.full_video_url || null;
  const videoUrl = showFull ? (fullUrl || clipUrl) : clipUrl;

  // reset failure flags whenever the source changes
  useEffect(() => { setVideoFailed(false); setImgFailed(false); }, [entry.scene_id, videoUrl]);

  let inner;
  if (videoUrl && !videoFailed) {
    inner = (
      <video key={videoUrl} controls autoPlay muted playsInline poster={firstKf || undefined}
        onError={() => setVideoFailed(true)}
        style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "contain", background: "#1d2733" }}>
        <source src={videoUrl} type="video/mp4" />
        {entry.subtitle_url ? <track kind="subtitles" srcLang="ko" label="한국어" src={entry.subtitle_url} default /> : null}
      </video>
    );
  } else if (firstKf && !imgFailed) {
    inner = (<img src={firstKf} alt="" onError={() => setImgFailed(true)} style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover", display: "block" }} />);
  } else {
    inner = <Placeholder />;
  }

  return (
    <div style={{ position: "relative", width: "100%", aspectRatio: "16 / 9", borderRadius: 16, overflow: "hidden", background: "#1d2733" }}>
      {inner}
    </div>
  );
}

/* ===================== Thumbnail strip ===================== */
function ThumbStrip({ data, index, onJump }) {
  return (
    <div style={{ display: "flex", gap: 8, overflowX: "auto", padding: "4px 2px", marginBottom: 18 }}>
      {data.map((d, i) => {
        const active = i === index;
        const thumb = (d.keyframes && d.keyframes[0]) || "";
        return (
          <button key={d.scene_id || i} onClick={() => onJump(i)} aria-label={`${i + 1}번 장면으로 이동`}
            style={{ flex: "0 0 auto", width: 72, height: 40, padding: 0, borderRadius: 8, overflow: "hidden", cursor: "pointer", background: "#1d2733", boxSizing: "border-box", border: active ? `2px solid ${T.navy}` : `1px solid ${T.line}`, opacity: active ? 1 : 0.7, transition: "opacity .12s ease" }}>
            {thumb ? (<img src={thumb} alt="" onError={(e) => (e.currentTarget.style.visibility = "hidden")} style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />)
              : (<span style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", color: "#5f6b7a" }}><Ico.photo width="18" height="18" /></span>)}
          </button>
        );
      })}
    </div>
  );
}

/* ===================== Main viewer ===================== */
function CaptionCompareViewer() {
  useFonts();
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [index, setIndex] = useState(0);
  const [showFull, setShowFull] = useState(false);

  useEffect(() => {
    fetch("/api/comparison")
      .then((r) => { if (!r.ok) throw new Error(`/api/comparison ${r.status}`); return r.json(); })
      .then((d) => setData(Array.isArray(d) ? d : (d && d.error ? (function () { throw new Error(d.error); })() : [])))
      .catch((e) => setError(String(e.message || e)));
  }, []);

  const total = data ? data.length : 0;
  const go = (delta) => setIndex((i) => Math.min(Math.max(i + delta, 0), Math.max(total - 1, 0)));

  useEffect(() => {
    const onKey = (e) => { if (e.key === "ArrowLeft") go(-1); else if (e.key === "ArrowRight") go(1); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [total]);

  // reset the full/clip toggle when navigating between scenes
  useEffect(() => { setShowFull(false); }, [index]);

  const shell = (children) => (
    <div style={{ fontFamily: T.fontKo, background: T.bg, color: T.text, maxWidth: 1080, margin: "0 auto", padding: "28px 24px 32px", boxSizing: "border-box" }}>
      <div style={{ display: "flex", justifyContent: "center", marginBottom: 56 }}><Logo height={48} /></div>
      {children}
    </div>
  );

  if (error) return shell(<div style={{ color: "#c0392b", textAlign: "center", padding: "40px 0" }}>데이터를 불러오지 못했습니다: {error}</div>);
  if (!data) return shell(<div style={{ color: T.sub, textAlign: "center", padding: "40px 0" }}>불러오는 중…</div>);
  if (total === 0) return shell(<div style={{ color: T.sub, textAlign: "center", padding: "40px 0" }}>표시할 결과가 없습니다.</div>);

  const cur = data[index];
  const atStart = index <= 0;
  const atEnd = index >= total - 1;
  const hasFull = !!cur.full_video_url;

  return shell(
    <React.Fragment>
      <div style={{ padding: "0 62px" }}><ThumbStrip data={data} index={index} onJump={setIndex} /></div>

      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        {atStart ? (<div style={{ width: 48, flexShrink: 0 }} />) : (<ArrowButton dir="left" onClick={() => go(-1)} />)}
        <div style={{ flex: 1, minWidth: 0, position: "relative" }}>
          <SceneMedia entry={cur} showFull={showFull} />
          <span style={{ position: "absolute", top: 12, right: 12, fontFamily: T.fontEn, fontSize: 13, fontWeight: 500, color: "#fff", background: "rgba(0,0,0,.45)", padding: "5px 11px", borderRadius: 8 }}>{index + 1} / {total}</span>
          {hasFull && (
            <button onClick={() => setShowFull((v) => !v)}
              style={{ position: "absolute", top: 12, left: 12, fontFamily: T.fontKo, fontSize: 13, fontWeight: 600, color: "#fff", background: showFull ? T.navy : "rgba(0,0,0,.45)", border: "none", padding: "6px 12px", borderRadius: 8, cursor: "pointer" }}>
              {showFull ? "구간 클립" : "전체 영상"}
            </button>
          )}
        </div>
        {atEnd ? (<div style={{ width: 48, flexShrink: 0 }} />) : (<ArrowButton dir="right" onClick={() => go(1)} />)}
      </div>

      <div style={{ textAlign: "center", marginTop: 8, fontFamily: T.fontEn, fontSize: 12, color: T.sub }}>
        {cur.scene_id}
        {(cur.clip_start != null && cur.clip_end != null) ? `  ·  ${cur.clip_start.toFixed(1)}–${cur.clip_end.toFixed(1)}s` : ""}
      </div>

      <div style={{ display: "flex", gap: 14, marginTop: 12, padding: "0 62px" }}>
        <HumanCard caption={cur.human_caption} />
        <AICard references={cur.claude_references} />
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CaptionCompareViewer />);
  </script>

  <script>
    (function () {
      try {
        var src = document.getElementById("app-source").textContent;
        var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
        (0, eval)(out);
      } catch (e) {
        document.getElementById("root").innerHTML =
          '<pre style="color:#c00;white-space:pre-wrap;padding:24px;font:13px/1.5 monospace">⚠️ 실행 에러:\n\n' +
          (e && (e.stack || e.message) ? (e.stack || e.message) : String(e)) + '</pre>';
      }
    })();
  </script>
</body>
